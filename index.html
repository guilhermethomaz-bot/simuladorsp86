<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Simulador MÁXIMO — SP86</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --y:#FFE600;--bl:#063361;--w:#fff;--dk:#2b2b2b;
  --gn:#1b5e20;--gnm:#43a047;--gnbg:#e8f5e9;
  --am:#e65100;--ambg:#fff3e0;
  --rd:#b71c1c;--rdbg:#ffebee;
  --g:#f0f0f0;--g2:#fafafa;--bdr:#e0e0e0;
  --sh:0 2px 14px rgba(6,51,97,.09);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#e4e8ef;color:var(--dk);min-height:100vh}

/* ── HEADER ── */
header{background:var(--bl);padding:14px 24px;border-bottom:4px solid var(--y);
  display:flex;justify-content:space-between;align-items:center;gap:12px}
.hdr-brand h1{font-size:19px;font-weight:900;color:var(--y)}
.hdr-brand p{font-size:10px;color:#7fa8d4;margin-top:2px;font-weight:600}
.hdr-r{display:flex;align-items:center;gap:10px}
.upd-label{cursor:pointer;background:var(--y);color:var(--bl);border-radius:8px;
  padding:8px 14px;font-size:11px;font-weight:800;white-space:nowrap}
.upd-label input[type=file]{display:none}
#upd{color:#7fa8d4;font-size:10px;font-weight:700}

/* ── SELECTOR ── */
#sel-wrap{padding:16px 24px 0}
.sel-card{background:var(--w);border-radius:12px;padding:16px 20px;box-shadow:var(--sh);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.sel-card label{font-size:13px;font-weight:800;color:var(--bl);white-space:nowrap}
#exec-sel{flex:1;min-width:220px;padding:10px 14px;border:2px solid var(--bdr);
  border-radius:8px;font-size:14px;font-weight:700;color:var(--dk);
  background:var(--w);cursor:pointer;outline:none}
#exec-sel:focus,#exec-sel:hover{border-color:var(--bl)}
.type-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:800;display:none}
.tb-e12{background:var(--bl);color:var(--y)}
.tb-e3{background:#4a148c;color:#fff}

/* ── LAYOUT ── */
#layout{display:grid;grid-template-columns:1fr 360px;gap:16px;padding:16px 24px 32px}
@media(max-width:960px){#layout{grid-template-columns:1fr}}

/* ── KPI BLOCKS ── */
#kpis{display:flex;flex-direction:column;gap:14px}

.kpi-block{background:var(--w);border-radius:14px;box-shadow:var(--sh);
  border:2px solid var(--bdr);overflow:hidden;transition:border-color .25s}
.kpi-block.ok{border-color:var(--gnm)}
.kpi-block.warn{border-color:var(--am)}
.kpi-block.crit{border-color:var(--rd)}
.kpi-block.off{opacity:.5;pointer-events:none;border-style:dashed}

/* block header */
.bk-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:14px 18px 0}
.bk-title{display:flex;align-items:center;gap:8px}
.bk-title h3{font-size:15px;font-weight:800;color:var(--dk)}
.bk-peso{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:800;background:#eef4ff;color:var(--bl)}
.bk-peso.pu{background:#f3e5f5;color:#4a148c}
.bk-atg{text-align:right}
.bk-atg .atgn{font-size:26px;font-weight:900;line-height:1;transition:color .3s}
.bk-atg .atgl{font-size:9px;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:.5px}

/* formula bar */
.formula{margin:8px 18px 0;padding:8px 12px;background:#f8f9ff;border-radius:8px;
  font-size:11px;color:var(--bl);border:1px solid #dde8ff;line-height:1.6}
.formula b{color:var(--bl)}
.formula .fresult{font-weight:900;font-size:13px}

/* ── COMPONENT SLIDERS ── */
.components{padding:12px 18px 16px;display:flex;flex-direction:column;gap:10px}

.comp{background:var(--g2);border-radius:10px;padding:12px 14px;border:1px solid var(--bdr);
  transition:border-color .2s}
.comp:hover{border-color:#b0c8f0}
.comp.parc-comp{background:#f1faf3;border-color:#a5d6a7}
.comp.parc-comp:hover{border-color:var(--gnm)}

.comp-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.comp-label{font-size:12px;font-weight:700;color:var(--dk)}
.comp-mult{font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;margin-left:5px}
.mult-low{background:#e8eaf6;color:#5c6bc0}
.mult-mid{background:#e0f2f1;color:#00695c}
.mult-high{background:var(--gnbg);color:var(--gn)}
.comp-vals{text-align:right}
.comp-sim{font-size:16px;font-weight:900;line-height:1;transition:color .3s}
.comp-cur{font-size:10px;color:#aaa;margin-top:1px}

/* THE ACTUAL RANGE SLIDER */
.comp-slider-wrap{position:relative;margin:8px 0 4px}
.comp-track{height:10px;background:#e0e8f0;border-radius:5px;position:relative;cursor:pointer}
.comp-fill{height:10px;border-radius:5px;position:absolute;left:0;top:0;transition:width .15s,background .3s;pointer-events:none}
.comp-thumb{position:absolute;top:50%;width:22px;height:22px;border-radius:50%;
  background:var(--bl);border:3px solid var(--y);box-shadow:0 2px 8px rgba(0,0,0,.2);
  transform:translateY(-50%);cursor:grab;transition:left .15s;pointer-events:none;z-index:2}
.comp-thumb:active{cursor:grabbing;transform:translateY(-50%) scale(1.1)}
input.range-input{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;
  z-index:3;margin:0;padding:0;-webkit-appearance:none}
.comp-minmax{display:flex;justify-content:space-between;font-size:9px;color:#bbb;padding:0 2px}
.comp-meta{font-size:10px;color:#aaa;margin-top:3px}

/* gap badge */
.gap-badge{display:inline-block;background:var(--ambg);border:1px solid var(--am);
  color:var(--am);padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;margin-top:6px}
.ok-badge{display:inline-block;background:var(--gnbg);border:1px solid var(--gnm);
  color:var(--gn);padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;margin-top:6px}

/* ── RESULT PANEL ── */
#result{position:sticky;top:16px;display:flex;flex-direction:column;gap:12px}

/* gauge */
.gauge-card{background:var(--bl);border-radius:14px;padding:20px;text-align:center;box-shadow:var(--sh)}
.gc-title{font-size:10px;font-weight:800;color:#7fa8d4;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.gc-ring{width:140px;height:140px;border-radius:50%;margin:0 auto 14px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:6px solid;transition:border-color .4s}
.gc-num{font-size:42px;font-weight:900;line-height:1;transition:color .3s}
.gc-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;
  color:rgba(255,255,255,.5);margin-top:3px}
.gc-delta{font-size:13px;font-weight:800;margin-top:4px}
.gc-bonus{background:var(--y);color:var(--bl);padding:7px 18px;border-radius:20px;
  font-size:12px;font-weight:900;display:inline-block;margin-top:10px}
.gc-miss{color:#7fa8d4;font-size:11px;margin-top:8px}

/* pilar breakdown */
.breakdown{background:var(--w);border-radius:12px;padding:16px;box-shadow:var(--sh)}
.bd-title{font-size:10px;font-weight:800;color:var(--bl);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:12px}
.bd-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.bd-lbl{font-size:11px;color:#555;flex:0 0 105px;font-weight:600}
.bd-bar{flex:1;height:8px;background:#eee;border-radius:4px;position:relative;overflow:visible}
.bd-fill{height:8px;border-radius:4px;transition:width .4s}
.bd-100{position:absolute;top:-3px;bottom:-3px;left:50%;width:2px;
  background:rgba(6,51,97,.2);border-radius:1px}
.bd-pct{font-size:12px;font-weight:800;flex:0 0 40px;text-align:right}
.bd-pp{font-size:10px;color:#aaa;flex:0 0 38px;text-align:right}

/* action plan */
.plan{background:var(--w);border-radius:12px;padding:16px;box-shadow:var(--sh)}
.plan-title{font-size:11px;font-weight:800;color:var(--bl);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--y);
  display:flex;align-items:center;gap:6px}
.pitem{display:flex;gap:10px;padding:10px 12px;border-radius:9px;border:1px solid;margin-bottom:8px}
.pitem.crit{background:var(--rdbg);border-color:var(--rd)}
.pitem.warn{background:var(--ambg);border-color:var(--am)}
.pitem.ok{background:var(--gnbg);border-color:var(--gnm)}
.pitem.info{background:#eef4ff;border-color:#c5d8f5}
.pi-ico{font-size:20px;flex-shrink:0}
.pi-t{font-size:12px;font-weight:800;color:var(--dk);margin-bottom:3px}
.pi-d{font-size:11px;color:#555;line-height:1.55}
.pi-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.pi-tag{background:rgba(6,51,97,.1);color:var(--bl);padding:2px 7px;
  border-radius:3px;font-size:9px;font-weight:700}

/* what-if */
.whif{background:var(--bl);border-radius:10px;padding:12px 14px;margin-top:2px}
.wh-t{font-size:9px;font-weight:800;color:#7fa8d4;text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:8px}
.wh-row{display:flex;justify-content:space-between;font-size:11px;
  margin-bottom:5px;color:#aac4e0}
.wh-v{color:var(--y);font-weight:800}

/* empty */
#empty{grid-column:1/-1;background:var(--w);border-radius:12px;padding:52px;
  text-align:center;box-shadow:var(--sh)}
#empty .ei{font-size:52px;margin-bottom:12px}
#empty p{font-size:14px;color:#aaa;font-weight:600}

/* toast */
#toast{position:fixed;bottom:20px;right:20px;z-index:500;padding:11px 18px;
  border-radius:10px;font-size:13px;font-weight:700;max-width:320px;
  box-shadow:0 4px 20px rgba(0,0,0,.2);transition:opacity .4s;
  pointer-events:none;opacity:0;color:#fff}

footer{background:var(--bl);color:#4a7aa8;padding:10px 24px;font-size:10px;
  text-align:center;border-top:3px solid var(--y)}
footer span{color:var(--y);font-weight:700}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#c0d0e0;border-radius:3px}
</style>
</head>

<header>
  <div class="hdr-brand">
    <h1>🧮 Simulador MÁXIMO — SP86</h1>

</header>

<div id="sel-wrap">
  <div class="sel-card">
    <label for="exec-sel">Quem está simulando?</label>

      <option value="">— Selecione seu nome —</option>
    </select>
    <span id="type-badge" class="type-badge"></span>
  </div>
</div>

<div id="layout">
  <div id="empty">
    <div class="ei">👆</div>
    <p>Selecione seu nome acima para iniciar a simulação</p>
  </div>
</div>

<div id="toast"></div>
<footer><span>JARVIS SP86</span> — Simulador MÁXIMO · Fora o Show</footer>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let CUR = null;   // current exec key
let S   = {};     // simulation state per component
// S = {
//   point: 0-200,  pix: 0-200,           → drives sim.c
//   pond:  0-max,                          → drives sim.m
//   deb_p: 0-max, c1x_p: 0-max, parc_p: 0-max  → drives sim.t
//   pri:   0-200                           → drives sim.p
// }

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function bc(x){if(x>=100)return'#43a047';if(x>=70)return'#fb8c00';return'#e53935'}
function fK(x){if(x>=1e6)return'R$'+(x/1e6).toFixed(2)+'M';if(x>=1000)return'R$'+(x/1000).toFixed(0)+'k';return'R$'+Math.round(x)}
function pf(x){return Math.round(x||0)+'%'}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function pesos(t){return t==='e3'?{c:0,m:20,t:40,p:40}:{c:10,m:30,t:35,p:25}}
function calcATG(){
  const d=EXEC_DATA[CUR]; if(!d)return 0;
  const w=pesos(d.tipo);
  const sc=Math.round(S.point*0.7+S.pix*0.3);
  const sm=d.m_mas>0?Math.round(S.pond/d.m_mas*100):0;
  const st=d.m_tpv>0?Math.round((S.deb_p+S.c1x_p+S.parc_p)/d.m_tpv*100):0;
  const sp=Math.round(S.pri);
  return{atg:Math.round(sc*w.c/100+sm*w.m/100+st*w.t/100+sp*w.p/100),sc,sm,st,sp};
}
function toast(msg,ok){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=ok?'#1b5e20':'#b71c1c';el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity='0'},3500);
}
function parseCSV(raw){
  if(raw.charCodeAt(0)===0xFEFF)raw=raw.slice(1);
  raw=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim();
  const lines=raw.split('\n').filter(l=>l.trim());
  const sep=lines[0].includes(';')&&lines[0].split(';').length>lines[0].split(',').length?';':',';
  const hdrs=lines[0].split(sep).map(h=>h.replace(/[\r\n"']/g,'').trim());
  return lines.slice(1).map(l=>{
    const v=l.split(sep);const o={};
    hdrs.forEach((h,i)=>{o[h]=(v[i]||'').replace(/[\r\n"']/g,'').trim();});
    return o;
  }).filter(r=>r.NOME&&r.NOME.trim());
}
function nv(x){const v=parseFloat(x);return isNaN(v)?0:v}

// ═══════════════════════════════════════════
//  LOAD CSV
// ═══════════════════════════════════════════
function loadCSV(e){
  const file=e.target.files&&e.target.files[0];e.target.value='';if(!file)return;
  const r=new FileReader();
  r.onerror=()=>toast('Erro ao ler o arquivo.',false);
  r.onload=ev=>{
    try{
      const rows=parseCSV(ev.target.result);
      if(!rows.length){toast('CSV sem dados.',false);return;}
      rows.forEach(row=>{
        const d=EXEC_DATA[row.NOME];if(!d)return;
        d.qtd_c=nv(row.QTD_CONQUISTA);d.m_c=nv(row.M_CONQUISTA);d.atg_c=nv(row.ATG_CONQUISTA);
        d.atg_point=nv(row.ATG_POINT);d.qtd_pix=nv(row.QTD_PIX);d.m_pix=nv(row.M_CHAVE_PIX);d.atg_pix=nv(row.ATG_PIX);
        d.total_mas=nv(row.TOTAL_MAS);d.pond_mas=nv(row.TOTAL_MAS_POND);d.m_mas=nv(row.M_MAS);d.atg_mas=nv(row.ATG_MAS);
        d.f1=nv(row.MAS_FAIXA_1);d.f2=nv(row.MAS_FAIXA_2);d.f3=nv(row.MAS_FAIXA_3);d.f4=nv(row.MAS_FAIXA_4);d.f5=nv(row.MAS_FAIXA_5);
        d.tpv_deb=nv(row.TPV_DEBITO);d.tpv_deb_p=nv(row.TPV_DEBITO_POND);
        d.tpv_c1x=nv(row.TPV_CREDITO1X);d.tpv_c1x_p=nv(row.TPV_CREDITO1X_POND);
        d.tpv_parc=nv(row.TPV_PARCELADO);d.tpv_parc_p=nv(row.TPV_PARCELADO_POND);
        d.tpv_tot=nv(row.TPV_TOTAL);d.m_tpv=nv(row.M_TPV);d.atg_tpv=nv(row.ATG_TPV);
        d.atg_pri_tpv=nv(row.ATG_PRI_TPV);d.atg_pri=nv(row.ATG_PRI_FINAL);d.atg_perf=nv(row.ATG_PERFORMANCE);
      });
      document.getElementById('upd').textContent='CSV atualizado ✓';
      toast('✅ Dados atualizados — '+rows.length+' executivos!',true);
      if(CUR)selectExec(CUR);
    }catch(err){toast('Erro: '+err.message,false);}
  };
  r.readAsText(file,'UTF-8');
}

// ═══════════════════════════════════════════
//  SELECT EXEC
// ═══════════════════════════════════════════
function selectExec(nome){
  CUR=nome;
  const badge=document.getElementById('type-badge');
  if(!nome||!EXEC_DATA[nome]){
    document.getElementById('layout').innerHTML='<div id="empty"><div class="ei">👆</div><p>Selecione seu nome para iniciar</p></div>';
    badge.style.display='none';return;
  }
  const d=EXEC_DATA[nome];
  // Init state from CSV values
  S={
    point: d.atg_point, pix: d.atg_pix,
    pond:  d.pond_mas,
    deb_p: d.tpv_deb_p, c1x_p: d.tpv_c1x_p, parc_p: d.tpv_parc_p,
    pri:   d.atg_pri
  };
  badge.style.display='inline-block';
  badge.textContent=d.tipo==='e3'?'Exec 3 — pesos especiais':'Exec 1/2';
  badge.className='type-badge '+(d.tipo==='e3'?'tb-e3':'tb-e12');
  render();
}

// ═══════════════════════════════════════════
//  SLIDER COMPONENT BUILDER
// ═══════════════════════════════════════════
function mkSlider(id, label, multLabel, multCls, simVal, curVal, curLabel, minVal, maxVal, step, unit, color){
  const pct = maxVal>0 ? clamp(simVal/maxVal*100,0,100) : 0;
  const display = unit==='R$' ? fK(simVal) : pf(simVal);
  const curDisplay = unit==='R$' ? fK(curVal) : pf(curVal);
  return `
  <div class="comp ${id==='parc_p'?'parc-comp':''}">
    <div class="comp-top">
      <div>
        <span class="comp-label">${label}</span>
        ${multLabel?`<span class="comp-mult ${multCls}">${multLabel}</span>`:''}
      </div>
      <div class="comp-vals">
        <div class="comp-sim" id="disp_${id}" style="color:${color||bc(simVal/(maxVal||1)*100)}">${display}</div>
        <div class="comp-cur">atual: ${curDisplay}</div>
      </div>
    </div>
    <div class="comp-slider-wrap">
      <div class="comp-track" id="track_${id}">
        <div class="comp-fill" id="fill_${id}" style="width:${pct}%;background:${color||bc(pct)}"></div>
        <div class="comp-thumb" id="thumb_${id}" style="left:calc(${pct}% - 11px)"></div>
        <input type="range" class="range-input" id="sli_${id}"
          min="${minVal}" max="${maxVal}" value="${simVal}" step="${step}"
          oninput="onSlide('${id}',this.value)">
      </div>
      <div class="comp-minmax">
        <span>${unit==='R$'?fK(minVal):minVal+'%'}</span>
        <span>${unit==='R$'?fK(maxVal):maxVal+'%'}</span>
      </div>
    </div>
    <div class="comp-meta">${curLabel}</div>
  </div>`;
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function render(){
  const d=EXEC_DATA[CUR]; if(!d)return;
  const w=pesos(d.tipo);
  const {atg,sc,sm,st,sp}=calcATG();
  const orig=d.atg_perf;
  const delta=atg-orig;
  const atgC=bc(atg);
  const cls=atg>=100?'ok':atg>=70?'warn':'crit';

  document.getElementById('layout').innerHTML=
    `<div id="kpis">${buildKPIs(d,w,sc,sm,st,sp)}</div>`+
    `<div id="result">${buildResult(d,w,atg,delta,atgC,cls,sc,sm,st,sp)}</div>`;
}

// ─── KPI blocks ───
function buildKPIs(d,w,sc,sm,st,sp){
  return buildConq(d,w,sc)+buildMAS(d,w,sm)+buildTPV(d,w,st)+buildPRI(d,w,sp);
}

function buildConq(d,w,sc){
  if(w.c===0) return `<div class="kpi-block off">
    <div class="bk-hdr"><div class="bk-title"><h3>🎯 Conquista</h3><span class="bk-peso pu">0% — Não pontua (Exec 3)</span></div></div>
    <div style="padding:12px 18px 16px;font-size:12px;color:#aaa">Conquista não impacta o MÁXIMO do Exec 3. Foco total em MAS, TPV e Pricing.</div>
  </div>`;
  const cls=sc>=100?'ok':sc>=70?'warn':'crit';
  const miss_c=Math.max(0,d.m_c-d.qtd_c);
  const miss_pix=Math.max(0,d.m_pix-d.qtd_pix);
  return `<div class="kpi-block ${cls}">
    <div class="bk-hdr">
      <div class="bk-title"><h3>🎯 Conquista</h3><span class="bk-peso">${w.c}% do MÁXIMO</span></div>
      <div class="bk-atg"><div class="atgn" style="color:${bc(sc)}">${pf(sc)}</div><div class="atgl">simulado</div></div>
    </div>
    <div class="formula">
      ATG Conquista = <b>Point × 0.7</b> + <b>PIX × 0.3</b> =
      <b>${pf(S.point)} × 0.7 + ${pf(S.pix)} × 0.3</b> =
      <span class="fresult" style="color:${bc(sc)}">${pf(sc)}</span>
    </div>
    <div class="components">
      ${mkSlider('point','com Point','70% da Conquista','mult-mid',S.point,d.atg_point,
        `${d.qtd_c} sellers conquistados de ${d.m_c} (meta)`,0,200,1,'%',bc(S.point))}
      ${mkSlider('pix','com Chave PIX','30% da Conquista','mult-low',S.pix,d.atg_pix,
        `${d.qtd_pix} sellers com PIX de ${d.m_pix} (meta)`,0,200,1,'%',bc(S.pix))}
      ${miss_c>0||miss_pix>0?`<div>
        ${miss_c>0?`<span class="gap-badge">📍 Faltam ${miss_c} sellers com Point</span> `:''}
        ${miss_pix>0?`<span class="gap-badge">📍 Faltam ${miss_pix} sellers com PIX</span>`:''}
      </div>`:'<span class="ok-badge">✅ Conquista na meta!</span>'}
    </div>
  </div>`;
}

function buildMAS(d,w,sm){
  const cls=sm>=100?'ok':sm>=70?'warn':'crit';
  const maxPond=Math.max(d.m_mas*2,20);
  const miss=Math.max(0,d.m_mas-S.pond);
  return `<div class="kpi-block ${cls}">
    <div class="bk-hdr">
      <div class="bk-title"><h3>🔗 MAS / Aderência</h3><span class="bk-peso ${d.tipo==='e3'?'pu':''}">${w.m}% do MÁXIMO</span></div>
      <div class="bk-atg"><div class="atgn" style="color:${bc(sm)}">${pf(sm)}</div><div class="atgl">simulado</div></div>
    </div>
    <div class="formula">
      ATG MAS = <b>Ponderado / Meta</b> = <b>${S.pond.toFixed(1)} / ${d.m_mas}</b> pts =
      <span class="fresult" style="color:${bc(sm)}">${pf(sm)}</span>
      <br><span style="color:#888;font-size:10px">Sellers de M0 com faturamento >R$20k em M1 e M2, ponderados por faixa de volume</span>
    </div>
    <div class="components">
      ${mkSlider('pond','Pontos Ponderados (MAS)','','',S.pond,d.pond_mas,
        `Meta: ${d.m_mas} pts · Atual: ${d.pond_mas} pts · Total sellers: ${d.total_mas}`,
        0,maxPond,0.5,'pts',bc(sm))}
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;background:var(--g2);border-radius:8px;padding:10px;border:1px solid var(--bdr)">
        <div style="grid-column:1/-1;font-size:9px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Distribuição atual por faixa</div>
        ${[1,2,3,4,5].map(f=>{const fv=d['f'+f]||0;return`<div style="text-align:center;background:#fff;border-radius:6px;padding:6px 4px;border:1px solid var(--bdr)"><div style="font-size:8px;color:#aaa;font-weight:700">F${f}</div><div style="font-size:16px;font-weight:900;color:${fv>0?'var(--bl)':'#ddd'}">${fv}</div><div style="font-size:8px;color:#aaa">sellers</div></div>`;}).join('')}
      </div>
      ${miss>0?`<span class="gap-badge">📍 Faltam ${miss.toFixed(1)} pts ponderados (atual ${S.pond.toFixed(1)} / meta ${d.m_mas})</span>`
              :`<span class="ok-badge">✅ MAS/Aderência na meta!</span>`}
    </div>
  </div>`;
}

function buildTPV(d,w,st){
  const cls=st>=100?'ok':st>=70?'warn':'crit';
  const totPond=S.deb_p+S.c1x_p+S.parc_p;
  const maxSl=Math.max(d.m_tpv*1.5, 100000);
  const tpvGap=Math.max(0,d.m_tpv-totPond);
  return `<div class="kpi-block ${cls}">
    <div class="bk-hdr">
      <div class="bk-title"><h3>💳 TPV Ponderado</h3><span class="bk-peso ${d.tipo==='e3'?'pu':''}">${w.t}% do MÁXIMO</span></div>
      <div class="bk-atg"><div class="atgn" style="color:${bc(st)}">${pf(st)}</div><div class="atgl">simulado</div></div>
    </div>
    <div class="formula">
      TPV Ponderado = <b>Débito×0.5</b> + <b>Créd.1x×1.0</b> + <b>Parcelado×2.0</b><br>
      = ${fK(S.deb_p)} + ${fK(S.c1x_p)} + ${fK(S.parc_p)} = <b>${fK(totPond)}</b> / meta <b>${fK(d.m_tpv)}</b> =
      <span class="fresult" style="color:${bc(st)}">${pf(st)}</span>
    </div>
    <div class="components">
      ${mkSlider('deb_p','Débito / PIX AM','× 0.5 — menor impacto','mult-low',
        S.deb_p, d.tpv_deb_p,
        `Volume bruto atual: ${fK(d.tpv_deb)} → ponderado: ${fK(d.tpv_deb_p)}`,
        0, maxSl, 1000, 'R$', '#5c6bc0')}
      ${mkSlider('c1x_p','Crédito 1x','× 1.0 — peso neutro','mult-mid',
        S.c1x_p, d.tpv_c1x_p,
        `Volume bruto atual: ${fK(d.tpv_c1x)} → ponderado: ${fK(d.tpv_c1x_p)}`,
        0, maxSl, 1000, 'R$', '#00897b')}
      ${mkSlider('parc_p','Crédito Parcelado','× 2.0 — maior impacto ⚡','mult-high',
        S.parc_p, d.tpv_parc_p,
        `Volume bruto atual: ${fK(d.tpv_parc)} → ponderado: ${fK(d.tpv_parc_p)} · Cada R$1 aqui vale R$2 no ponderado!`,
        0, maxSl, 1000, 'R$', '#43a047')}
      <div style="background:#eef4ff;border-radius:8px;padding:9px 12px;border:1px solid #c5d8f5">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;font-weight:700;color:var(--bl)">Total Ponderado Simulado</span>
          <span style="font-size:16px;font-weight:900;color:${bc(st)}">${fK(totPond)} / ${fK(d.m_tpv)}</span>
        </div>
      </div>
      ${tpvGap>0?`<span class="gap-badge">📍 Gap de ${fK(tpvGap)} em ponderado para bater a meta</span>`
               :`<span class="ok-badge">✅ TPV na meta!</span>`}
    </div>
  </div>`;
}

function buildPRI(d,w,sp){
  const cls=sp>=100?'ok':sp>=70?'warn':'crit';
  return `<div class="kpi-block ${cls}">
    <div class="bk-hdr">
      <div class="bk-title"><h3>📈 PRI / Pricing</h3><span class="bk-peso ${d.tipo==='e3'?'pu':''}">${w.p}% do MÁXIMO</span></div>
      <div class="bk-atg"><div class="atgn" style="color:${bc(sp)}">${pf(sp)}</div><div class="atgl">simulado</div></div>
    </div>
    <div class="formula">
      PRI Final = Receita bruta gerada / Receita esperada pelo mix de produtos<br>
      <span style="color:#888;font-size:10px">Simulado: <b style="color:${bc(sp)}">${pf(sp)}</b> · PRI sobre TPV atual: ${pf(d.atg_pri_tpv)}</span>
    </div>
    <div class="components">
      ${mkSlider('pri','PRI Final','driver principal','mult-mid',
        S.pri, d.atg_pri,
        `PRI sobre TPV atual: ${pf(d.atg_pri_tpv)} · PRI Final atual no CSV: ${pf(d.atg_pri)}`,
        0, 200, 1, '%', bc(sp))}
      <div style="background:var(--g2);border-radius:8px;padding:10px 12px;border:1px solid var(--bdr)">
        <div style="font-size:10px;font-weight:800;color:var(--bl);margin-bottom:6px">Como melhorar o PRI:</div>
        <div style="font-size:11px;color:#555;line-height:1.7">
          ⚡ Aumentar share de <b>parcelado</b> na carteira (meta: ≥50% do TPV bruto)<br>
          ⚡ Onboarding do <b>Mercado Crédito</b> para sellers elegíveis (>R$30k/mês)<br>
          ⚡ Garantir <b>PRI de M0</b>: todos os sellers com ao menos 1 transação<br>
          ⚡ Focar em vendas de <b>maior ticket</b> com mais parcelas
        </div>
      </div>
      ${sp<100?`<span class="gap-badge">📍 ${100-sp}pp para chegar a 100% no PRI</span>`
             :`<span class="ok-badge">✅ PRI/Pricing na meta!</span>`}
    </div>
  </div>`;
}

// ─── Result panel ───
function buildResult(d,w,atg,delta,atgC,cls,sc,sm,st,sp){
  return buildGauge(d,atg,delta,atgC)+buildBreakdown(d,w,sc,sm,st,sp)+buildPlan(d,w,atg,sc,sm,st,sp);
}

function buildGauge(d,atg,delta,atgC){
  const bonus=atg>=100;
  const bC=bc(atg);
  return `<div class="gauge-card">
    <div class="gc-title">Seu MÁXIMO Simulado</div>
    <div class="gc-ring" style="border-color:${bC}">
      <div class="gc-num" style="color:${bC}">${atg}%</div>
      <div class="gc-lbl">ATG</div>
    </div>
    <div style="font-size:11px;color:#7fa8d4">
      CSV: <b style="color:${bc(d.atg_perf)}">${d.atg_perf}%</b> &nbsp;·&nbsp;
      Simulado: <b style="color:${bC}">${atg}%</b> &nbsp;·&nbsp;
      <b style="color:${delta>=0?'#69f0ae':'#ff8a80'}">${delta>=0?'+':''}${delta}pp</b>
    </div>
    ${bonus
      ?`<div class="gc-bonus">🎉 Bônus +20% Desbloqueado!</div>`
      :`<div class="gc-miss">Faltam <b>${100-atg}pp</b> para o bônus +20%</div>`}
  </div>`;
}

function buildBreakdown(d,w,sc,sm,st,sp){
  const kpis=[
    {l:'Conquista',   peso:w.c, sim:sc},
    {l:'MAS/Aderência',peso:w.m, sim:sm},
    {l:'TPV',          peso:w.t, sim:st},
    {l:'PRI/Pricing',  peso:w.p, sim:sp}
  ];
  const rows=kpis.map(k=>{
    if(k.peso===0) return `<div class="bd-row">
      <span class="bd-lbl" style="color:#ccc">${k.l}</span>
      <div class="bd-bar" style="background:#f5f5f5"></div>
      <span class="bd-pct" style="color:#ccc">—</span>
      <span class="bd-pp" style="color:#ccc">0pp</span>
    </div>`;
    const fill=Math.min(k.sim,200)/200*100;
    const pp=Math.round(k.sim*k.peso/100);
    const c=bc(k.sim);
    return `<div class="bd-row">
      <span class="bd-lbl">${k.l}</span>
      <div class="bd-bar">
        <div class="bd-fill" style="width:${fill}%;background:${c}"></div>
        <div class="bd-100"></div>
      </div>
      <span class="bd-pct" style="color:${c}">${pf(k.sim)}</span>
      <span class="bd-pp" style="color:${c}">${pp}pp</span>
    </div>`;
  }).join('');
  return `<div class="breakdown">
    <div class="bd-title">Contribuição por Pilar</div>
    ${rows}
    <div style="font-size:9px;color:#aaa;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0">
      C:${w.c}% · MAS:${w.m}% · TPV:${w.t}% · PRI:${w.p}% · Total: 100%
    </div>
  </div>`;
}

function buildPlan(d,w,atg,sc,sm,st,sp){
  const gap=100-atg;
  const items=[];
  if(atg>=100){
    items.push({cls:'ok',ico:'✅',t:'Meta atingida — bônus +20% garantido!',
      d:`ATG de ${atg}%. Para crescer ainda mais: amplie a aderência dos sellers de M1/M2, aumente o share de parcelado e apoie um colega a chegar na meta.`,
      tags:['Manter ritmo','Crescer TPV','Apoiar o time']});
  } else {
    if(w.c>0&&sc<100){
      const ms=Math.max(0,d.m_c-d.qtd_c); const imp=Math.round((100-sc)*w.c/100);
      items.push({cls:sc<50?'crit':'warn',ico:'🎯',
        t:`Conquista ${pf(sc)} — faltam ${ms} sellers`,
        d:`Conquiste mais ${ms} sellers com faturamento >R$30k. Foco em varejo parcelado (vestuário, construção, eletrônicos). Valide CNPJ antes de cada proposta.`,
        tags:[`+${ms} sellers`,`+${imp}pp no ATG`,'Varejo parcelado','>R$30k faturamento']});
    }
    if(sm<100){
      const mP=Math.max(0,d.m_mas-S.pond); const imp=Math.round((100-sm)*w.m/100);
      items.push({cls:sm<30?'crit':'warn',ico:'🔗',
        t:`MAS ${pf(sm)} — faltam ${mP.toFixed(1)} pts ponderados`,
        d:`Visite os sellers conquistados e faça onboarding de PDV Software e Link de Pagamento para aumentar o faturamento deles acima de R$20k/mês em M1 e M2.`,
        tags:[`+${mP.toFixed(1)} pts pond.`,`+${imp}pp no ATG`,'Onboarding PDV','Acompanhar M1/M2']});
    }
    if(st<100){
      const tG=Math.max(0,d.m_tpv-(S.deb_p+S.c1x_p+S.parc_p)); const imp=Math.round((100-st)*w.t/100);
      items.push({cls:st<50?'crit':'warn',ico:'💳',
        t:`TPV ${pf(st)} — gap de ${fK(tG)} ponderado`,
        d:`A forma mais rápida: ativar parcelamento nos sellers (vale 2x no ponderado). Onboarding de Mercado Crédito para elegíveis e foco nos top 5 sellers da carteira.`,
        tags:[`+${fK(tG)} ponderado`,`+${imp}pp no ATG`,'Parcelado ×2.0','Mercado Crédito']});
    }
    if(sp<100){
      const imp=Math.round((100-sp)*w.p/100);
      items.push({cls:sp<30?'crit':'warn',ico:'📈',
        t:`PRI ${pf(sp)} — melhorar receita bruta`,
        d:`Aumente o share de parcelado (≥50% do TPV), faça onboarding do Mercado Crédito e garanta que todos os sellers de M0 tenham ao menos 1 transação.`,
        tags:[`+${imp}pp no ATG`,'Share parcelado ≥50%','PRI M0','Ticket alto']});
    }
  }

  // What-if box
  let wh='';
  if(atg<100){
    const rows=[];
    if(w.c>0&&sc<100){const n=Math.min(200,Math.ceil(sc+(gap*100/w.c)));rows.push({k:'Conquista',f:sc,t:n,pp:Math.round((n-sc)*w.c/100)});}
    if(sm<100){const n=Math.min(200,Math.ceil(sm+(gap*100/w.m)));rows.push({k:'MAS/Aderência',f:sm,t:n,pp:Math.round((n-sm)*w.m/100)});}
    if(st<100){const n=Math.min(200,Math.ceil(st+(gap*100/w.t)));rows.push({k:'TPV',f:st,t:n,pp:Math.round((n-st)*w.t/100)});}
    if(sp<100){const n=Math.min(200,Math.ceil(sp+(gap*100/w.p)));rows.push({k:'PRI/Pricing',f:sp,t:n,pp:Math.round((n-sp)*w.p/100)});}
    if(rows.length) wh=`<div class="whif">
      <div class="wh-t">Para chegar a 100% — faltam ${gap}pp</div>
      ${rows.slice(0,3).map(r=>`<div class="wh-row"><span>${r.k}: ${pf(r.f)} → ${pf(r.t)}</span><span class="wh-v">+${r.pp}pp</span></div>`).join('')}
    </div>`;
  }

  return `<div class="plan">
    <div class="plan-title">📋 Plano de Ação</div>
    ${items.map(i=>`<div class="pitem ${i.cls}">
      <div class="pi-ico">${i.ico}</div>
      <div>
        <div class="pi-t">${i.t}</div>
        <div class="pi-d">${i.d}</div>
        <div class="pi-tags">${i.tags.map(t=>`<span class="pi-tag">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('')}
    ${wh}
  </div>`;
}

// ═══════════════════════════════════════════
//  SLIDE HANDLER
// ═══════════════════════════════════════════
function onSlide(key, val){
  S[key] = parseFloat(val);
  const d=EXEC_DATA[CUR]; if(!d) return;

  // Fast visual update — just update this component's display
  const maxVal = parseFloat(document.getElementById('sli_'+key).max);
  const pct = maxVal>0 ? clamp(S[key]/maxVal*100,0,100) : 0;
  const c = key==='deb_p'?'#5c6bc0': key==='c1x_p'?'#00897b': key==='parc_p'?'#43a047': bc(pct);
  const fill=document.getElementById('fill_'+key);
  const thumb=document.getElementById('thumb_'+key);
  const disp=document.getElementById('disp_'+key);
  if(fill) fill.style.width=pct+'%', fill.style.background=c;
  if(thumb) thumb.style.left=`calc(${pct}% - 11px)`;
  const unit = (key==='deb_p'||key==='c1x_p'||key==='parc_p'||key==='pond')?'R$':'%';
  const display = (key==='deb_p'||key==='c1x_p'||key==='parc_p') ? fK(S[key])
                : key==='pond' ? S[key].toFixed(1)+' pts'
                : pf(S[key]);
  if(disp){ disp.textContent=display; disp.style.color=c; }

  // Full re-render for formula + result panel
  render();
}

document.addEventListener('DOMContentLoaded',function(){
  const sel=document.getElementById('exec-sel');
  Object.entries(EXEC_DATA)
    .sort((a,b)=>a[1].nm.localeCompare(b[1].nm))
    .forEach(([nome,d])=>{
      const o=document.createElement('option');
      o.value=nome; o.textContent=d.nm;
      sel.appendChild(o);
    });
});
